<body>
    <p><h2>My Story</h2></p>
    <br>
    <p>
        Like everyone else, my mother told me I was special. 
        Whether she was true or not, I guess that's for you to decide.
    
    </p>

        Every since I was a child, I was curious. I was curious about
        how things smelled, tasted, consisted of, heard, looked, and felt.
        This curiosity has led me to many different directions in life;
        good and bad. We'll get back to this later.

    <p>

        After volunteering for a special needs camp in high school, it was
        apparent to me that the seemingly selfish satisfaction you receive,
        from helping others in a time of need, is unlike any other feeling. 
        So after high school, I attended Adelphi University for their nursing
        program, in hopes of serving every patient I could. While in college, 
        I joined the fraternity, Phi Sigma Kappa. For majority of my college tenure 
        I was Community Service Chair to satisfy the want to help others alongside my "brothers"
        (and a bunch of other positions that are irrelevant to this story). Low and behold, 
        volunteering and serving others on the weekends were at the bottom of their college 
        bucket list. 
    
    </p>
    <p>
        
        After 2 years of nursing school, my motivation was almost non-existent. 
        The satisfaction, I cherished volunteering at camp, was not even close to being replicated. 
        So, after switching majors, I graduated with an undergraduate degree.
        After graduation, I immediately enrolled into the Masters of Public Health program. 
        It seemed like a good idea at the time. Public health jobs would allow me to 
        serve on the macro scale. Unfortunately, after completely my Master's degree, 
        no job in the field had really piqued my interest the slightest. 
    
    </p>

        What did I do next, you ask? I began my path on becoming a DOCTOR. Yes, a doctor.
        My sister, an anesthesiologist, asked me one day, if I would be happy if I were a 
        doctor. I responded with <strong>OF COURSE</strong>. Until that moment, I had never 
        thought of myself as a doctor. I probably should not have put so much weight on that moment. 
        I scribed for 5 months for two fantastic doctors. During that time from just watching 
        and taking notes, I was finally able to experience the slightest satisfaction I received for 
        that short time of high school.
    
    </p>
    <p>

        We now fast forward two years through the horrible pandemic of 2020 to November 6th, 2022. I 
        took the prerequisite courses in order to apply for medical school at LaSalle University. I met 
        the best professors, nicest students and even better classmates. However, I decided to change my 
        path once again. I had been studying for the MCAT for some time now and the material just 
        did not interest me one bit. I ignored advice and thought I could just power through
        studying for this dry material, get a good score, write a good essay, and be on my way to 
        helping people. Well, it turns out, at no point during my time studying, did I think 
        being as miserable as I felt worth the outcome. 
    </p>
